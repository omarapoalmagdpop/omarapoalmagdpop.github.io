<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - Personal Course Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Personal Course Organizer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Add a New Course</h2>
            <p>Fill out this form to add a class to your schedule.</p>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="course-name">Course Name:</label>
                    <input type="text" id="course-name" name="course_name" required>
                </div>

                <div class="form-group">
                    <label for="instructor">Instructor:</label>
                    <input type="text" id="instructor" name="instructor" required>
                </div>

                <div class="form-group">
                    <label for="credits">Credit Hours:</label>
                    <input type="number" id="credits" name="credits" min="1" max="6" required>
                </div>

                <div class="form-group">
                    <label for="notes">Course Notes:</label>
                    <textarea id="notes" name="notes" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <input type="submit" value="Save Course">
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Intro to Web Dev Assignment</p>
    </footer>
</body>
</html>
